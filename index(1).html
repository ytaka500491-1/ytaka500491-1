<html>
<head><meta charset="utf-8"></head>
<body>
    <!-- IDを追加してJSから操作しやすくします -->
    <video id="myVideo" src="InShot_20250724_173510400~2.mp4" controls width="640" height="340"></video>
    
    <p>ずっとながれる</p>
    <label><input type="radio" name="answer" value="yes" > はい</label>
    <label><input type="radio" name="answer" value="no" checked> いいえ</label>

    <script>
        const video = document.getElementById('myVideo');
        const radios = document.querySelectorAll("input[name='answer']");

        // 初期状態（「はい」がチェックされている場合）を反映
        video.loop = false;

        radios.forEach(radio => {
            radio.onclick = () => {
                // valueが "yes" なら true、そうでなければ false を loop に代入
                video.loop = (radio.value === "yes");
            };
        });
    </script>
</body>
</html>
